<!-- Receipt Modal (Chi tiết hóa đơn) -->
<div id="receipt-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-on-background/40 backdrop-blur-sm transition-opacity">
    <div class="bg-surface-container-lowest w-full max-w-md p-6 rounded-2xl shadow-2xl relative max-h-[90vh] flex flex-col mx-4 animate-[fadeIn_0.2s_ease-out]">
        <!-- Header -->
        <div class="flex justify-between items-center border-b border-outline-variant/30 pb-4 mb-4">
            <div>
                <h3 class="text-xl font-bold text-primary">Chi tiết hóa đơn</h3>
                <p id="receipt-order-id" class="text-sm text-on-surface-variant font-medium">Đơn #...</p>
            </div>
            <button onclick="closeReceipt()" class="p-2 text-on-surface-variant hover:text-error hover:bg-error-container rounded-full transition-colors active:scale-90">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <!-- Content (Scrollable) -->
        <div id="receipt-content" class="flex-1 overflow-y-auto pr-2 space-y-4">
            <!-- Items injected here by JS -->
        </div>
        <!-- Footer (Total) -->
        <div class="border-t border-outline-variant/30 pt-4 mt-4">
            <div class="flex justify-between items-center">
                <span class="text-base font-bold text-on-surface-variant">Tổng thanh toán</span>
                <span id="receipt-total" class="text-2xl font-black text-primary">0đ</span>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const formatPrice = (price) => price.toLocaleString('vi-VN') + 'đ';
        
        let currentFilter = 'all'; // Lưu trữ trạng thái của bộ lọc hiện tại

        const employeeName = localStorage.getItem('employeeName');
        if (employeeName) {
            const nameElement = document.getElementById('employeeName');
            if (nameElement) nameElement.textContent = employeeName;
        }

        function renderOrders() {
            const ordersGrid = document.getElementById('orders-grid');
            ordersGrid.innerHTML = '';

            const activeOrders = JSON.parse(localStorage.getItem('activeOrders')) || {};
            const paidOrders = JSON.parse(localStorage.getItem('paidOrders')) || [];

            // 1. Render Đơn Hàng Đang Phục Vụ
            if (currentFilter === 'all' || currentFilter === 'active') {
                for (const [tableName, order] of Object.entries(activeOrders)) {
                    if (order && order.items && order.items.length > 0) {
                        const orderId = order.orderId || Math.floor(Math.random() * 9000 + 1000); // Tạo ID giả nếu chưa có
                        const itemsHtml = order.items.map(item => `
                            <div class="flex justify-between text-sm">
                                <div class="flex gap-2">
                                    <span class="font-bold text-primary">${item.quantity}x</span>
                                    <div>
                                        <p class="font-semibold text-on-surface">${item.name}</p>
                                        <p class="text-xs text-on-surface-variant">Size ${item.selectedSize || 'Vừa'}</p>
                                    </div>
                                </div>
                            </div>
                        `).join('');

                        const cardHtml = `
                            <article class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-container-high relative overflow-hidden flex flex-col hover:shadow-md transition-shadow">
                                <div class="h-1 w-full bg-error/80 absolute top-0 left-0"></div>
                                <div class="p-5 flex-1 flex flex-col">
                                    <div class="flex justify-between items-start mb-3">
                                        <div>
                                            <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider block mb-1">${tableName}</span>
                                            <span class="text-lg font-extrabold text-primary">Đơn #${orderId}</span>
                                        </div>
                                        <div class="bg-error-container text-on-error-container text-xs font-semibold px-2.5 py-1 rounded-full flex items-center gap-1.5 border border-error/20">
                                            <span class="w-1.5 h-1.5 rounded-full bg-error"></span>
                                            Đang phục vụ
                                        </div>
                                    </div>
                                    <div class="flex items-center text-xs text-on-surface-variant mb-4 bg-surface-container-low p-2 rounded-lg">
                                        <span class="material-symbols-outlined text-[16px] mr-1.5 text-primary">schedule</span>
                                        Vào bàn: ${order.time || new Date().toLocaleTimeString('vi-VN', {hour: '2-digit', minute:'2-digit'})}
                                    </div>
                                    <div class="relative w-full h-[1px] my-2">
                                        <div class="absolute inset-0 border-t border-dashed border-outline-variant"></div>
                                        <div class="absolute -left-[25px] top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-surface"></div>
                                        <div class="absolute -right-[25px] top-1/2 -translate-y-1/2 w-3 h-3 rounded-full bg-surface"></div>
                                    </div>
                                    <div class="flex-1 py-3 space-y-3">
                                        ${itemsHtml}
                                    </div>
                                    <div class="w-full border-t border-dashed border-outline-variant my-3"></div>
                                    <div class="flex justify-between items-center mb-5">
                                        <span class="text-sm font-medium text-on-surface-variant">Tổng cộng</span>
                                        <span class="text-lg font-extrabold text-primary">${formatPrice(order.total)}</span>
                                    </div>
                                    <button onclick="alert('Vui lòng Xác nhận thanh toán tại trang Sơ đồ bàn để hoàn thành đơn này!')" class="w-full bg-surface-container-highest text-on-surface-variant font-bold py-3 rounded-xl cursor-not-allowed opacity-70">
                                        Chờ thanh toán...
                                    </button>
                                </div>
                            </article>
                        `;
                        ordersGrid.insertAdjacentHTML('beforeend', cardHtml);
                    }
                }
            }

            // 2. Render Đơn Hàng Đã Thanh Toán
            if (currentFilter === 'all' || currentFilter === 'paid') {
                paidOrders.forEach(order => {
                    const itemsHtml = order.items.map(item => `
                        <div class="flex justify-between text-sm opacity-70">
                            <div class="flex gap-2">
                                <span class="font-bold">${item.quantity}x</span>
                                <div>
                                    <p class="font-medium text-on-surface">${item.name}</p>
                                    <p class="text-xs text-on-surface-variant">Size ${item.selectedSize || 'Vừa'}</p>
                                </div>
                            </div>
                        </div>
                    `).join('');

                    const cardHtml = `
                        <article class="bg-surface-container-lowest rounded-xl shadow-sm border border-surface-container-high relative overflow-hidden flex flex-col opacity-80 hover:opacity-100 transition-opacity">
                            <div class="h-1 w-full bg-[#10B981]/80 absolute top-0 left-0"></div>
                            <div class="p-5 flex-1 flex flex-col">
                                <div class="flex justify-between items-start mb-3">
                                    <div>
                                        <span class="text-xs font-bold text-on-surface-variant uppercase tracking-wider block mb-1">${order.tableName}</span>
                                        <span class="text-lg font-extrabold text-on-surface-variant">Đơn #${order.orderId}</span>
                                    </div>
                                    <div class="bg-[#D1FAE5] text-[#065F46] text-xs font-semibold px-2.5 py-1 rounded-full flex items-center gap-1.5 border border-[#10B981]/20">
                                        <span class="w-1.5 h-1.5 rounded-full bg-[#10B981]"></span>
                                        Đã thanh toán
                                    </div>
                                </div>
                                <div class="flex items-center text-xs text-on-surface-variant mb-4 bg-surface-container-low p-2 rounded-lg">
                                    <span class="material-symbols-outlined text-[16px] mr-1.5">check_circle</span>
                                    Hoàn tất: ${order.completedAt}
                                </div>
                                <div class="relative w-full h-[1px] my-2">
                                    <div class="absolute inset-0 border-t border-dashed border-outline-variant"></div>
                                </div>
                                <div class="flex-1 py-3 space-y-3">
                                    ${itemsHtml}
                                </div>
                                <div class="w-full border-t border-dashed border-outline-variant my-3"></div>
                                <div class="flex justify-between items-center mb-5">
                                    <span class="text-sm font-medium text-on-surface-variant">Tổng cộng</span>
                                    <span class="text-lg font-bold text-on-surface-variant">${formatPrice(order.total)}</span>
                                </div>
                                <button onclick="viewReceipt('${order.orderId}')" class="w-full bg-transparent border border-outline hover:bg-surface-container-low text-on-surface font-bold py-3 rounded-xl transition-colors active:scale-[0.98]">
                                    Xem hóa đơn
                                </button>
                            </div>
                        </article>
                    `;
                    ordersGrid.insertAdjacentHTML('beforeend', cardHtml);
                });
            }

            if (ordersGrid.innerHTML === '') {
                ordersGrid.innerHTML = `<div class="col-span-full text-center py-10 text-on-surface-variant">Hiện không có đơn hàng nào phù hợp với bộ lọc.</div>`;
            }
        }

        // Gọi hàm Render
        renderOrders();

        // Tự động Cập nhật lại UI nếu bên trang sơ đồ bàn thay đổi (qua storage event)
        window.addEventListener('storage', (e) => {
            if (e.key === 'activeOrders' || e.key === 'paidOrders') {
                renderOrders();
            }
        });

        // Hàm xử lý lọc đơn hàng khi nhấn vào các nút
        window.setFilter = function(type, btnElement) {
            currentFilter = type;
            
            // Cập nhật lại UI cho các nút bấm (Màu sắc, chữ đậm nhạt, bóng đổ...)
            const allBtns = document.querySelectorAll('.filter-btn');
            allBtns.forEach(btn => {
                btn.classList.remove('bg-primary', 'text-on-primary', 'font-semibold', 'shadow-[0_4px_15px_rgba(85,55,34,0.15)]', 'border-transparent');
                btn.classList.add('bg-surface-container-lowest', 'text-on-surface', 'border-outline-variant', 'font-medium', 'hover:bg-surface-container-low');
            });

            btnElement.classList.add('bg-primary', 'text-on-primary', 'font-semibold', 'shadow-[0_4px_15px_rgba(85,55,34,0.15)]', 'border-transparent');
            btnElement.classList.remove('bg-surface-container-lowest', 'text-on-surface', 'border-outline-variant', 'font-medium', 'hover:bg-surface-container-low');
            
            renderOrders(); // Vẽ lại lưới đơn hàng theo bộ lọc mới
        };

        window.viewReceipt = function(orderId) {
            const paidOrders = JSON.parse(localStorage.getItem('paidOrders')) || [];
            const order = paidOrders.find(o => o.orderId.toString() === orderId.toString());

            if (!order) {
                alert("Không tìm thấy thông tin đơn hàng!");
                return;
            }

            // Gắn dữ liệu vào Modal
            document.getElementById('receipt-order-id').textContent = `${order.tableName} - Đơn #${order.orderId} - Hoàn tất: ${order.completedAt}`;
            
            const contentContainer = document.getElementById('receipt-content');
            contentContainer.innerHTML = '';

            order.items.forEach(item => {
                contentContainer.insertAdjacentHTML('beforeend', `
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <p class="font-bold text-on-surface">${item.name}</p>
                            <p class="text-xs text-on-surface-variant">Size ${item.selectedSize || 'Vừa'} x ${item.quantity}</p>
                        </div>
                        <p class="font-semibold text-primary">${formatPrice(item.finalPrice * item.quantity)}</p>
                    </div>
                `);
            });

            document.getElementById('receipt-total').textContent = formatPrice(order.total);

            // Hiển thị Modal và khóa cuộn trang nền
            const modal = document.getElementById('receipt-modal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
        };

        // Hàm đóng Hóa đơn
        window.closeReceipt = function() {
            const modal = document.getElementById('receipt-modal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        };
    });
</script>
