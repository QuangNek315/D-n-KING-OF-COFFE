<script>
        const defaultProducts = [
            { id: 1, cat: 'coffee', name: 'Cà phê Sữa Đá', price: 35000, img: './images/Cà phê Sữa Đá.jpg', bestseller: true },
            { id: 2, cat: 'coffee', name: 'Bạc Xỉu Đá', price: 32000, img: './images/Bạc Xỉu Đá.jpg', bestseller: true },
            { id: 3, cat: 'coffee', name: 'Cà phê Đen Đá', price: 29000, img: './images/Cà phê Đen Đá.jpg' },
            { id: 4, cat: 'coffee', name: 'Latte Nóng', price: 45000, img: './images/Latte Nóng.jpg' },
            { id: 5, cat: 'coffee', name: 'Cappuccino', price: 45000, img: './images/Cappuccino.jpg' },
            { id: 6, cat: 'coffee', name: 'Cà phê Trứng', price: 49000, img: './images/Cà phê Trứng.jpg', bestseller: true },
            { id: 7, cat: 'coffee', name: 'Cold Brew', price: 42000, img: './images/Cold Brew.jpg' },
            { id: 8, cat: 'coffee', name: 'Americano', price: 35000, img: './images/Americano.jpg' },
            { id: 9, cat: 'coffee', name: 'Mocha Đá', price: 48000, img: './images/Mocha Đá.jpg' },
            { id: 10, cat: 'coffee', name: 'Cà phê Muối', price: 39000, img: './images/Cà phê Muối.jpg' },
            { id: 11, cat: 'tea', name: 'Trà Đào Cam Sả', price: 45000, img: './images/Trà Đào Cam Sả.jpg', bestseller: true },
            { id: 12, cat: 'tea', name: 'Trà Vải Khiếm', price: 42000, img: './images/Trà Vải Khiếm.jpg' },
            { id: 13, cat: 'tea', name: 'Trà Sen Vàng', price: 45000, img: './images/Trà Sen Vàng.jpg', bestseller: true },
            { id: 14, cat: 'tea', name: 'Trà Thảo Mộc', price: 38000, img: './images/Trà Thảo Mộc.jpg' },
            { id: 15, cat: 'tea', name: 'Trà Đen Macchiato', price: 40000, img: './images/Trà Đen Macchiato.jpg' },
            { id: 16, cat: 'tea', name: 'Trà Sữa Truyền Thống', price: 35000, img: './images/Trà Sữa Truyền Thống.jpg' },
            { id: 17, cat: 'tea', name: 'Trà Oolong', price: 32000, img: './images/Trà Oolong.jpg' },
            { id: 18, cat: 'tea', name: 'Trà Chanh Dây', price: 39000, img: './images/Trà Chanh Dây.jpg' },
            { id: 19, cat: 'tea', name: 'Hồng Trà Tắc', price: 30000, img: './images/Hồng Trà Tắc.jpg' },
            { id: 20, cat: 'tea', name: 'Trà Hoa Cúc', price: 38000, img: './images/Trà Hoa Cúc.jpg' },
            { id: 21, cat: 'smoothie', name: 'Sinh tố Bơ', price: 55000, img: './images/Sinh tố Bơ.jpg' },
            { id: 22, cat: 'smoothie', name: 'Sinh tố Mãng Cầu', price: 48000, img: './images/Sinh tố Mãng Cầu.jpg' },
            { id: 23, cat: 'smoothie', name: 'Sinh tố Xoài', price: 45000, img: './images/Sinh tố Xoài.jpg' },
            { id: 24, cat: 'smoothie', name: 'Sinh tố Dâu Tây', price: 50000, img: './images/Sinh tố Dâu Tây.jpg' },
            { id: 25, cat: 'smoothie', name: 'Sinh tố Chuối', price: 40000, img: './images/Sinh tố Chuối.jpg' },
            { id: 26, cat: 'smoothie', name: 'Sinh tố Việt Quất', price: 58000, img: './images/Sinh tố Việt Quất.jpg' },
            { id: 27, cat: 'smoothie', name: 'Sinh tố Dưa Hấu', price: 38000, img: './images/Sinh tố Dưa Hấu.jpg' },
            { id: 28, cat: 'smoothie', name: 'Sinh tố Chanh Dây', price: 42000, img: './images/Sinh tố Chanh Dây.jpg' },
            { id: 29, cat: 'smoothie', name: 'Sinh tố Sapo', price: 45000, img: './images/Sinh tố Sapo.jpg' },
            { id: 30, cat: 'smoothie', name: 'Smoothie Chocolate', price: 55000, img: './images/Smoothie Chocolate.jpg' }
        ];

        let products = JSON.parse(localStorage.getItem('kingOfCoffeeMenu'));
        if (!products || products.length === 0) {
            products = defaultProducts;
            localStorage.setItem('kingOfCoffeeMenu', JSON.stringify(products));
        }
        let currentCategory = 'all';

        // Khôi phục giỏ hàng từ localStorage để khi khách F5 trang không bị mất món đã chọn
        const currentTable = localStorage.getItem('selectedTable') || 'Bàn 1';
        let savedOrders = JSON.parse(localStorage.getItem('activeOrders')) || {};
        let cart = (savedOrders[currentTable] && savedOrders[currentTable].items) ? savedOrders[currentTable].items : [];

        let currentItemSelecting = null;

        function formatPrice(price) {
            return price.toLocaleString('vi-VN') + 'đ';
        }

        function renderProducts(category) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            
            let productsToRender = category === 'all' 
                ? [...products]
                : products.filter(p => p.cat === category);

            // Sắp xếp đồng nhất cho tất cả danh mục: 
            // 1. Món mới thêm (ID > 30) lên đầu tiên
            // 2. Món bán chạy (bestseller) xếp kế tiếp
            // 3. Cuối cùng sắp xếp các món còn lại theo ID giảm dần (mới nhất xếp trước)
            productsToRender.sort((a, b) => {
                const aIsNew = a.id > 30 ? 1 : 0;
                const bIsNew = b.id > 30 ? 1 : 0;
                if (aIsNew !== bIsNew) return bIsNew - aIsNew; // Đưa món mới lên đầu

                const aIsBestseller = a.bestseller ? 1 : 0;
                const bIsBestseller = b.bestseller ? 1 : 0;
                if (aIsBestseller !== bIsBestseller) return bIsBestseller - aIsBestseller; // Kế tiếp là món bán chạy

                return b.id - a.id;
            });

            productsToRender.forEach(p => {
                let badges = '';
                if (p.bestseller) {
                    badges += `
                        <div class="bg-secondary text-on-primary text-[9px] font-bold uppercase tracking-wider px-2 py-1 rounded-full shadow-lg flex items-center gap-1">
                            <span class="material-symbols-outlined" style="font-size: 14px; font-variation-settings: 'FILL' 1, 'wght' 600;">star</span>
                            <span>Bán chạy</span>
                        </div>
                    `;
                }
                if (p.id > 30) { // Các món có ID > 30 là món mới thêm
                    badges += `
                        <div class="bg-error text-white text-[9px] font-bold uppercase tracking-wider px-2 py-1 rounded-full shadow-lg flex items-center gap-1">
                            <span class="material-symbols-outlined" style="font-size: 14px; font-variation-settings: 'FILL' 1, 'wght' 600;">new_releases</span>
                            <span>Mới</span>
                        </div>
                    `;
                }
                const badgeContainer = badges ? `<div class="absolute top-2.5 left-2.5 flex flex-col gap-1 z-10">${badges}</div>` : '';

                const card = `
                    <div class="bg-surface-container-lowest rounded-3xl overflow-hidden shadow-[0_8px_30px_rgb(0,0,0,0.04)] group flex flex-col h-full relative">
                        <div class="aspect-square relative overflow-hidden">
                            <img class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" data-alt="${p.name}" src="${p.img}"/>
                            ${badgeContainer}
                        </div>
                        <div class="p-4 flex flex-col flex-grow">
                            <h3 class="font-bold text-on-surface text-sm mb-1 line-clamp-2">${p.name}</h3>
                            <div class="flex justify-between items-center mt-auto">
                                <span class="text-primary font-bold text-sm">${formatPrice(p.price)}</span>
                                <button class="w-8 h-8 bg-primary text-white rounded-full flex items-center justify-center active:scale-90 transition-transform" onclick="openSizeSheet(${p.id})">
                                    <span class="material-symbols-outlined text-xl">add</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', card);
            });
        }

        function filterCategory(category, btn) {
            currentCategory = category;
            document.querySelectorAll('.category-btn').forEach(b => {
                b.classList.remove('bg-primary', 'text-on-primary', 'shadow-lg', 'shadow-primary/20', 'font-semibold');
                b.classList.add('bg-surface-container-low', 'text-on-surface-variant', 'font-medium');
            });
            
            btn.classList.add('bg-primary', 'text-on-primary', 'shadow-lg', 'shadow-primary/20', 'font-semibold');
            btn.classList.remove('bg-surface-container-low', 'text-on-surface-variant', 'font-medium');

            renderProducts(category);
        }

        function openSizeSheet(productId) {
            const p = products.find(item => item.id === productId);
            if (!p) return;
            currentItemSelecting = p;

            document.getElementById('sheet-title').innerText = p.name;
            document.getElementById('sheet-price').innerText = formatPrice(p.price);
            document.getElementById('sheet-img').src = p.img;
            
            const overlay = document.getElementById('size-overlay');
            const sheet = document.getElementById('size-sheet');
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                sheet.classList.remove('translate-y-full');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeSizeSheet() {
            const overlay = document.getElementById('size-overlay');
            const sheet = document.getElementById('size-sheet');
            
            sheet.classList.add('translate-y-full');
            setTimeout(() => {
                overlay.classList.add('hidden');
            }, 300);
            document.body.style.overflow = '';
            currentItemSelecting = null;
        }

        function confirmAddToCart() {
            if (!currentItemSelecting) return;
            
            const selectedSize = document.querySelector('input[name="size"]:checked').value;
            const extraPrice = selectedSize === 'L' ? 10000 : 0;
            const finalPrice = currentItemSelecting.price + extraPrice;

            const existingItem = cart.find(item => item.id === currentItemSelecting.id && item.selectedSize === selectedSize);

            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                const cartItem = {
                    ...currentItemSelecting,
                    selectedSize,
                    finalPrice,
                    quantity: 1,
                    uniqueId: Date.now() + Math.random()
                };
                cart.push(cartItem);
            }

            updateCartUI();
            closeSizeSheet();
        }

        function updateCartUI() {
            const badge = document.getElementById('cart-badge');
            badge.innerText = cart.reduce((acc, item) => acc + item.quantity, 0);

            const container = document.getElementById('cart-items-container');
            container.innerHTML = '';

            let total = 0;

            cart.forEach(item => {
                total += item.finalPrice * item.quantity;
                const itemHtml = `
                    <div class="flex space-x-4 p-4 bg-surface-container-lowest rounded-2xl">
<div class="w-20 h-20 rounded-2xl overflow-hidden bg-surface-container-low flex-shrink-0">
<img class="w-full h-full object-cover" src="${item.img}"/>
</div>
<div class="flex-1">
<div class="flex justify-between items-start">
<h4 class="font-bold text-sm leading-tight pr-2">${item.name}</h4>
<button class="text-outline/40 hover:text-error transition-colors" onclick="removeFromCart(${item.uniqueId})">
<span class="material-symbols-outlined text-lg">close</span>
</button>
</div>
<p class="text-[10px] text-on-surface-variant/70 font-medium uppercase tracking-wider mt-0.5">Size ${item.selectedSize}</p>
<div class="flex justify-between items-center mt-3">
<span class="text-primary font-black text-sm">${formatPrice(item.finalPrice * item.quantity)}</span>
<div class="flex items-center bg-surface-container-high rounded-full px-1 py-1 gap-3">
<button class="w-6 h-6 flex items-center justify-center bg-surface rounded-full text-primary active:scale-90 transition-transform" onclick="decreaseQuantity(${item.uniqueId})">

            });

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-20 text-on-surface-variant opacity-60 font-medium">Giỏ hàng trống</div>`;
            }

            document.getElementById('cart-total').innerText = formatPrice(total);
            
            // Lưu đơn hàng vào localStorage cho bàn đã chọn để trang sơ đồ bàn của nhân viên có thể đọc được
            const selectedTable = localStorage.getItem('selectedTable') || 'Bàn 1';
            let activeOrders = JSON.parse(localStorage.getItem('activeOrders')) || {};
            if (cart.length > 0) {
                activeOrders[selectedTable] = {
                    items: cart,
                    total: total,
                    status: 'Đang phục vụ',
                    time: activeOrders[selectedTable]?.time || new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' })
                };
            } else {
                delete activeOrders[selectedTable]; // Tự động xóa bàn nếu giỏ hàng trống
            }
            localStorage.setItem('activeOrders', JSON.stringify(activeOrders));
        }

        function increaseQuantity(uniqueId) {
            const item = cart.find(i => i.uniqueId === uniqueId);
            if (item) {
                item.quantity += 1;
                updateCartUI();
            }
        }

        function decreaseQuantity(uniqueId) {
            const item = cart.find(i => i.uniqueId === uniqueId);
            if (item && item.quantity > 1) {
                item.quantity -= 1;
                updateCartUI();
            }
        }

        function removeFromCart(uniqueId) {
            cart = cart.filter(item => item.uniqueId !== uniqueId);
            updateCartUI();
        }

        function toggleCart() {
            const overlay = document.getElementById('cart-overlay');
            const panel = document.getElementById('cart-panel');
            const isHidden = panel.classList.contains('translate-x-full');
            
            if (isHidden) {
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    panel.classList.remove('translate-x-full');
                }, 10);
                document.body.style.overflow = 'hidden';
            } else {
                panel.classList.add('translate-x-full');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
                document.body.style.overflow = '';
            }
        }

        function proceedToCheckout() {
            if (cart.length > 0) {
                // Lưu giỏ hàng vào localStorage trước khi chuyển trang
                localStorage.setItem('kingOfCoffeeCart', JSON.stringify(cart));
                window.location.href = '../THANHTOANKH.html/thanhtoan.html';
            } else {
                alert('Giỏ hàng của bạn đang trống!');
            }
        }

        // Tự động cập nhật menu nếu có thay đổi từ trang Quản lý (Real-time giữa các tab)
        window.addEventListener('storage', (e) => {
            if (e.key === 'kingOfCoffeeMenu') {
                products = JSON.parse(e.newValue) || defaultProducts;
                renderProducts(currentCategory); // Tự động vẽ lại lưới sản phẩm
            }
        });

        window.onload = () => {
            const headerTable = document.getElementById('header-table-name');
            if (headerTable) {
                headerTable.innerText = (localStorage.getItem('selectedTable') || 'Bàn 1') + " - Vui lòng chọn món";
            }
            renderProducts('all');
            updateCartUI();
        };
    </script>
