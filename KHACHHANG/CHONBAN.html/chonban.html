<script>
  function renderTables() {
      const lockedTables = JSON.parse(localStorage.getItem('lockedTables')) || {};
      const activeOrders = JSON.parse(localStorage.getItem('activeOrders')) || {};
      const buttons = document.querySelectorAll('main section.bg-surface-container-low button');
      
      const mySelectedTable = localStorage.getItem('selectedTable');

      buttons.forEach(button => {
          const tableName = button.querySelector('span.font-bold').textContent.trim();
          // Bàn được xem là có người khi có trong lockedTables hoặc đã có đơn hàng (activeOrders)
          const isOccupiedByOthers = (lockedTables[tableName] || (activeOrders[tableName] && activeOrders[tableName].items && activeOrders[tableName].items.length > 0)) && tableName !== mySelectedTable;

          // Reset toàn bộ class
          button.className = 'aspect-square rounded-[1.5rem] flex flex-col items-center justify-center gap-2 transition-all';
          const icon = button.querySelector('.material-symbols-outlined');
          
          if (isOccupiedByOthers) {
              // Bàn đã bị người khác chọn (Màu đỏ sậm, vô hiệu hóa)
              button.classList.add('bg-[#ba1a1a]', 'text-white', 'opacity-60', 'cursor-not-allowed');
              icon.classList.remove('opacity-40');
              button.onclick = (e) => {
                  e.preventDefault();
                  alert('Bàn này đã có khách. Vui lòng chọn bàn trống khác!');
              };
          } else if (tableName === mySelectedTable) {
              // Bàn của chính mình vừa click vào
              button.classList.add('active-table', 'shadow-[0_10px_30px_rgba(85,55,34,0.12)]');
              icon.classList.remove('opacity-40');
              button.onclick = () => selectTable(tableName);
          } else {
              // Bàn trống hoàn toàn
              button.classList.add('bg-surface-container-lowest', 'border', 'border-outline-variant/30', 'text-primary', 'hover:bg-surface-container-highest', 'active:scale-95');
              icon.classList.add('opacity-40');
              button.onclick = () => selectTable(tableName);
          }
      });
  }

  function selectTable(tableName) {
      let lockedTables = JSON.parse(localStorage.getItem('lockedTables')) || {};
      let activeOrders = JSON.parse(localStorage.getItem('activeOrders')) || {};
      const mySelectedTable = localStorage.getItem('selectedTable');

      // Chống click trùng (Double check đề phòng 2 khách click cùng 1 mili-giây)
      if ((lockedTables[tableName] || (activeOrders[tableName] && activeOrders[tableName].items && activeOrders[tableName].items.length > 0)) && tableName !== mySelectedTable) {
          alert('Rất tiếc, bàn này vừa có người khác nhanh tay chọn mất!');
          renderTables();
          return;
      }

      // Nếu khách đổi ý sang bàn mới, mở khóa trả lại bàn cũ
      if (mySelectedTable && mySelectedTable !== tableName) {
          delete lockedTables[mySelectedTable];
      }

      // Đặt khóa cho bàn mới
      lockedTables[tableName] = Date.now();
      localStorage.setItem('lockedTables', JSON.stringify(lockedTables));
      localStorage.setItem('selectedTable', tableName);

      renderTables();

      setTimeout(() => {
        window.location.href = '../MENUKH.html/menu.html';
      }, 300);
  }

  document.addEventListener('DOMContentLoaded', () => {
      // Dọn dẹp các bàn bị khóa quá 1 tiếng (Tránh lỗi kẹt bàn nếu khách thoát web nửa chừng)
      let lockedTables = JSON.parse(localStorage.getItem('lockedTables')) || {};
      const now = Date.now();
      let changed = false;
      for (const table in lockedTables) {
          if (now - lockedTables[table] > 60 * 60 * 1000) { 
              delete lockedTables[table];
              changed = true;
          }
      }
      if (changed) localStorage.setItem('lockedTables', JSON.stringify(lockedTables));

      renderTables();

      // Đồng bộ real-time ngay lập tức nếu có khách khác ở máy khác vừa chọn bàn
      window.addEventListener('storage', (e) => {
          if (e.key === 'lockedTables' || e.key === 'activeOrders') {
              renderTables();
          }
      });
  });
</script></body></html>
